name: Container Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  docker-container:
    name: Docker Image Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ---------------------------------------------------------
      # Build vulnerable Docker image
      # ---------------------------------------------------------
      - name: Build Vulnerable Docker Image
        run: docker build -t vulnerable-python-app:local .

      # ---------------------------------------------------------
      # TRIVY SCANNER
      # ---------------------------------------------------------
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'vulnerable-python-app:local'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # ---------------------------------------------------------
      # SNYK SCANNER
      # ---------------------------------------------------------
      - name: Run Snyk Container Scanner
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: 'vulnerable-python-app:local'
          args: '--file=Dockerfile --severity-threshold=high --org=31be863e-5019-422f-94bb-27b4b342ad48'
        continue-on-error: true
